name: "새 픽 (New Pick)"
description: "햇제 픽(종목·목표 수익률) 등록 · Register a Called It pick (ticker and target return)"
title: "[PICK] "
labels: ["pick-submission"]
body:
  - type: markdown
    attributes:
      value: |
        ### 한국어
        제출 전 확인: 사용자당 **진행 중 픽 20개 이하**, **같은 티커는 사용자당 1개**만 가능합니다. 규칙 위반 시 이 이슈에 안내 댓글이 달릴 수 있습니다.

        한국(KR)은 **KRX / KOSPI / KOSDAQ**, 홍콩(HK)은 **HKG**, 일본(JP)은 **TYO**입니다. **Country가 JP/HK인데 Market을 다른 값으로 두어도 등록 시 TYO/HKG로 자동 보정**됩니다(드롭다운이 국가별로 바뀌지 않기 때문). KR/US는 **양식에서 고른 시장**을 우선하며 거래소 접두를 자동 시도합니다(일본 제외). 홍콩은 티커 **앞자리 0**(예: 0700). **일본**은 Google Finance **4자리 코드**(예: `7203`, `7203.T` 입력 금지).

        맨 아래 **추가 메모**는 선택 사항이며, 입력하면 공개 사이트 픽 상세에서 접어 두었다가 볼 수 있습니다. 시스템 판정·목표가에는 사용되지 않습니다.

        ### English
        Before submitting: at most **20** active picks per user; only **one** active pick per ticker per user. Invalid submissions may receive a comment on this issue.

        **KR:** **KRX**, **KOSPI**, or **KOSDAQ**. **HK:** **HKG** (wrong Market with HK is corrected to HKG). **JP:** **TYO** (wrong Market with JP is corrected to TYO). Ticker digits only (e.g. 7203). **US:** many ETFs use **NYSEARCA** or **BATS**. If registration fails, verify on [Google Finance](https://www.google.com/finance/).

        **Optional note:** the last field below is optional; if filled, it appears on the public pick detail (collapsed by default). Not used for pricing or rules — e.g. personal context or a hypothetical stop level in prose only.

  - type: input
    id: ticker
    attributes:
      label: "Ticker / 티커"
      description: "영문·숫자만 (예 AAPL, 005930) · Alphanumeric only, e.g. AAPL or 005930"
      placeholder: "AAPL"
    validations:
      required: true

  - type: dropdown
    id: country
    attributes:
      label: "Country / 국가"
      options:
        - US
        - KR
        - HK
        - JP
    validations:
      required: true

  - type: dropdown
    id: market
    attributes:
      label: "Market / 시장"
      description: "국가와 짝 맞추기 · US: NASDAQ/… · KR: KRX/KOSPI/KOSDAQ · HK: HKG · JP: TYO"
      options:
        - NASDAQ
        - NYSE
        - NYSEARCA
        - BATS
        - NYSEAMERICAN
        - KRX
        - KOSPI
        - KOSDAQ
        - HKG
        - TYO
    validations:
      required: true

  - type: input
    id: target_return
    attributes:
      label: "Target return (%) / 목표 수익률 (%)"
      description: "절댓값 10~1000 (양수=상승 예측, 음수=하락 예측, 예: 10 → +10%, -20 → -20%) · Magnitude 10–1000; positive = up, negative = down (e.g. 10 or -20)"
      placeholder: "10"
    validations:
      required: true

  - type: dropdown
    id: duration
    attributes:
      label: "Duration (days) / 기간 (일)"
      options:
        - "7"
        - "14"
        - "30"
        - "90"
        - "180"
    validations:
      required: true

  - type: textarea
    id: author_note
    attributes:
      label: "Additional note (optional) / 추가 메모 (선택)"
      description: "Short free text (max ~2000 chars). Shown on the public pick detail only; not used for automated prices or targets. · 짧은 부가 설명만. 공개 상세에만 표시되며 시세·목표 계산에는 반영되지 않습니다."
      placeholder: "e.g. context, or a personal stop level in words (not enforced by the app)"
    validations:
      required: false
