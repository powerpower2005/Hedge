name: "새 픽 (New Pick)"
description: "햇제 픽(종목·목표 수익률) 등록 · Register a Called It pick (ticker and target return)"
title: "[PICK] "
labels: ["pick-submission"]
body:
  - type: markdown
    attributes:
      value: |
        ### 한국어
        제출 전 확인: 사용자당 **진행 중 픽 10개 미만**, **같은 티커는 사용자당 1개**만 가능합니다. 규칙 위반 시 이 이슈에 안내 댓글이 달릴 수 있습니다.

        한국(KR)은 **KRX / KOSPI / KOSDAQ** 중 해당하는 시장을 고르세요. 스프레드시트 `GOOGLEFINANCE`에는 모두 **`KRX:티커`**로 들어갑니다. 미국(US) ETF·Arca 종목은 **NYSEARCA**, 아멕스 계열은 **NYSEAMERICAN**을 고려하세요. 등록이 실패하면 [Google Finance](https://www.google.com/finance/)에서 **거래소 접두**와 **티커**가 맞는지 확인해 보세요.

        ### English
        Before submitting: fewer than **10** active picks per user; only **one** active pick per ticker per user. Invalid submissions may receive a comment on this issue.

        **KR:** pick **KRX**, **KOSPI**, or **KOSDAQ** by segment; Sheets still uses `KRX:ticker` for `GOOGLEFINANCE`. **US:** many ETFs list on **NYSEARCA**; small caps may use **NYSEAMERICAN**. If registration fails, verify **exchange prefix + ticker** on [Google Finance](https://www.google.com/finance/).

  - type: input
    id: ticker
    attributes:
      label: "Ticker / 티커"
      description: "영문·숫자만 (예 AAPL, 005930) · Alphanumeric only, e.g. AAPL or 005930"
      placeholder: "AAPL"
    validations:
      required: true

  - type: dropdown
    id: country
    attributes:
      label: "Country / 국가"
      options:
        - US
        - KR
    validations:
      required: true

  - type: dropdown
    id: market
    attributes:
      label: "Market / 시장"
      description: "국가와 짝 맞추기 · US: NASDAQ/NYSE/NYSEARCA/NYSEAMERICAN · KR: KRX/KOSPI/KOSDAQ (Sheets는 KR 모두 KRX: 접두)"
      options:
        - NASDAQ
        - NYSE
        - NYSEARCA
        - NYSEAMERICAN
        - KRX
        - KOSPI
        - KOSDAQ
    validations:
      required: true

  - type: input
    id: target_return
    attributes:
      label: "Target return (%) / 목표 수익률 (%)"
      description: "10~100 사이 숫자 (10이면 +10%, 15면 +15%) · Number from 10 to 100 (e.g. 10 means +10%)"
      placeholder: "10"
    validations:
      required: true

  - type: dropdown
    id: duration
    attributes:
      label: "Duration (days) / 기간 (일)"
      options:
        - "7"
        - "14"
        - "30"
        - "90"
        - "180"
    validations:
      required: true
