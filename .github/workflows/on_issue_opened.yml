name: Register New Pick

on:
  issues:
    types: [opened]

concurrency:
  group: pick-register-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  register:
    if: contains(github.event.issue.labels.*.name, 'pick-submission')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Write service account
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python -c "import os, pathlib; p=pathlib.Path('config'); p.mkdir(exist_ok=True); pathlib.Path('config/service_account.json').write_text(os.environ['GOOGLE_SERVICE_ACCOUNT_JSON'], encoding='utf-8')"

      - name: Register pick
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          REPO: ${{ github.repository }}
        run: python scripts/register_pick.py

      - name: Commit and push
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes"
            exit 0
          fi
          git commit -m "chore(data): register pick from issue #${{ github.event.issue.number }}"
          for i in 1 2 3 4 5; do
            git pull --rebase origin "$BRANCH" && git push origin "$BRANCH" && break
            sleep $((i * 3))
          done

      - name: Cleanup service account
        if: always()
        run: rm -f config/service_account.json
