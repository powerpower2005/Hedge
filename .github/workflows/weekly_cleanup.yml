name: Weekly Cleanup

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

concurrency:
  group: repo-data-main-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - run: pip install -r scripts/requirements.txt

      - name: Run cleanup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python scripts/weekly_cleanup.py

      - name: Commit and push
        env:
          BRANCH: main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            exit 0
          fi
          git commit -m "chore(data): weekly cleanup $(date -u +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            git pull --rebase origin "$BRANCH" && git push origin "$BRANCH" && break
            sleep $((i * 3))
          done

      - name: Job failed — context (no secrets)
        if: failure()
        env:
          REPO: ${{ github.repository }}
        run: bash scripts/ci_failure_context.sh
