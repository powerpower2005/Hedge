name: Sync Votes

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - run: pip install -r scripts/requirements.txt

      - name: Sync votes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python scripts/sync_votes.py

      - name: Commit and push
        env:
          BRANCH: main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            exit 0
          fi
          git commit -m "chore(data): sync votes $(date -u +%Y-%m-%dT%H:00:00Z)"
          for i in 1 2 3 4 5; do
            git pull --rebase origin "$BRANCH" && git push origin "$BRANCH" && break
            sleep $((i * 3))
          done

      - name: Job failed — context (no secrets)
        if: failure()
        env:
          REPO: ${{ github.repository }}
        run: |
          echo "Sync: needs REPO + GITHUB_TOKEN; only active picks get reactions from GitHub API."
          bash scripts/ci_failure_context.sh
