name: Daily Judgment JP

on:
  schedule:
    # TSE close 15:00 JST; run after refreshAllJpPrices has filled column D.
    - cron: "30 6 * * *"
  workflow_dispatch:

concurrency:
  group: repo-data-main-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  judge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Write service account
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python -c "import os, pathlib; pathlib.Path('config').mkdir(exist_ok=True); pathlib.Path('config/service_account.json').write_text(os.environ['GOOGLE_SERVICE_ACCOUNT_JSON'], encoding='utf-8')"

      - name: Run judgment (JP)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          REPO: ${{ github.repository }}
          TELEGRAM_BOT_TOKEN_HEALTHY_FIRE_BOT: ${{ secrets.TELEGRAM_BOT_TOKEN_HEALTHY_FIRE_BOT }}
          TELEGRAM_CHAT_ID_HEALTHY_GAEMI: ${{ secrets.TELEGRAM_CHAT_ID_HEALTHY_GAEMI }}
        run: python scripts/daily_judgment.py --country JP

      - name: Commit and push
        env:
          BRANCH: main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            exit 0
          fi
          git commit -m "chore(data): daily judgment JP $(date -u +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            git pull --rebase origin "$BRANCH" && git push origin "$BRANCH" && break
            sleep $((i * 3))
          done

      - name: Job failed — context (no secrets)
        if: failure()
        env:
          REPO: ${{ github.repository }}
        run: |
          echo "Judgment(JP): PriceLookup-jp-v1 column D (refreshAllJpPrices) + Secrets (GOOGLE_SHEET_ID, GOOGLE_SERVICE_ACCOUNT_JSON)."
          if [ -f scripts/ci_failure_context.sh ]; then
            bash scripts/ci_failure_context.sh
          fi

      - name: Cleanup service account
        if: always()
        run: rm -f config/service_account.json

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[AUTO] Daily judgment JP failed - ${new Date().toISOString().split('T')[0]}`,
              body: `Daily judgment JP workflow failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['system-error', 'priority-high']
            });
