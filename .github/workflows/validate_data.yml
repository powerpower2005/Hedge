name: Validate Data

on:
  pull_request:
    paths:
      - "data/**"
      - "schemas/**"
  push:
    branches: [main]
    paths:
      - "data/**"
      - "schemas/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install -g ajv-cli@5

      - name: Validate data/active.json
        run: ajv validate -s schemas/pick_list.v1.json -r schemas/pick.v1.json -d data/active.json --strict=false

      - name: Validate data/hall_of_fame.json
        run: ajv validate -s schemas/pick_list.v1.json -r schemas/pick.v1.json -d data/hall_of_fame.json --strict=false

      - name: Validate data/expired_recent.json
        run: ajv validate -s schemas/pick_list.v1.json -r schemas/pick.v1.json -d data/expired_recent.json --strict=false

      - name: Validate data/meta.json
        run: ajv validate -s schemas/meta.v1.json -d data/meta.json --strict=false

      - name: Validate data/bars/v1/**/*.json
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob globstar
          files=(data/bars/v1/**/*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No bar files yet (ok before first backfill)."
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "validate $f"
            ajv validate -s schemas/instrument_bars.v1.json -d "$f" --strict=false
          done

      - name: Validate data/archive/*.json
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in data/archive/*.json; do
            echo "validate $f"
            ajv validate -s schemas/pick_list.v1.json -r schemas/pick.v1.json -d "$f" --strict=false
          done

      - name: Validate data/votes/*.json
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in data/votes/*.json; do
            echo "validate $f"
            ajv validate -s schemas/votes.v1.json -d "$f" --strict=false
          done

      - name: Validate data failed — context (no secrets)
        if: failure()
        run: |
          echo "The first red X above is the failing file or archive/votes loop."
          bash scripts/ci_failure_context.sh
