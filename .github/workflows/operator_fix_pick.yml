name: Operator fix pick

on:
  workflow_dispatch:
    inputs:
      pick_id:
        description: "Numeric pick id (same as data JSON id)"
        required: true
        type: string
      action:
        description: "remove = drop from all list JSON; delist = mark delisted in active.json only"
        required: true
        type: choice
        options:
          - remove
          - delist
      reason:
        description: "Short reason (delist: stored in status.history; remove: commit body)"
        required: true
        type: string
      delete_sheet_row:
        description: "If remove: delete Google Sheet row for this pick_id (needs Secrets)"
        required: true
        type: boolean
        default: true

concurrency:
  group: operator-data-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Write service account (Sheets delete on remove)
        if: ${{ inputs.action == 'remove' && inputs.delete_sheet_row }}
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python -c "import os, pathlib; pathlib.Path('config').mkdir(exist_ok=True); pathlib.Path('config/service_account.json').write_text(os.environ['GOOGLE_SERVICE_ACCOUNT_JSON'], encoding='utf-8')"

      - name: Run operator fix
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          set -euo pipefail
          EXTRA=""
          if [ "${{ inputs.action }}" = "remove" ] && [ "${{ inputs.delete_sheet_row }}" != "true" ]; then
            EXTRA="--no-delete-sheet-row"
          fi
          python scripts/operator_fix_pick.py \
            --pick-id "${{ inputs.pick_id }}" \
            --action "${{ inputs.action }}" \
            --reason "${{ inputs.reason }}" \
            $EXTRA

      - name: Cleanup service account
        if: always()
        run: rm -f config/service_account.json

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate data (ajv)
        run: |
          npm install -g ajv-cli@5
          python scripts/validate_schema.py

      - name: Commit and push
        env:
          BRANCH: main
          REASON: ${{ inputs.reason }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          BODY=$(printf '%.500s' "$REASON")
          git commit -m "chore(data): operator ${{ inputs.action }} pick #${{ inputs.pick_id }}" -m "$BODY"
          for i in 1 2 3 4 5; do
            git pull --rebase origin "$BRANCH" && git push origin "$BRANCH" && break
            sleep $((i * 3))
          done
