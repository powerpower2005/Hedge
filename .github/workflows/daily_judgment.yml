name: Daily Judgment

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  judge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Write service account
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python -c "import os, pathlib; pathlib.Path('config').mkdir(exist_ok=True); pathlib.Path('config/service_account.json').write_text(os.environ['GOOGLE_SERVICE_ACCOUNT_JSON'], encoding='utf-8')"

      - name: Run judgment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          REPO: ${{ github.repository }}
        run: python scripts/daily_judgment.py

      - name: Commit and push
        env:
          BRANCH: main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            exit 0
          fi
          git commit -m "chore(data): daily judgment $(date -u +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            git pull --rebase origin "$BRANCH" && git push origin "$BRANCH" && break
            sleep $((i * 3))
          done

      - name: Cleanup service account
        if: always()
        run: rm -f config/service_account.json

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[AUTO] Daily judgment failed - ${new Date().toISOString().split('T')[0]}`,
              body: `Daily judgment workflow failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['system-error', 'priority-high']
            });
