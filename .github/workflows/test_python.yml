name: Python tests

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "tests/**"
      - "pytest.ini"
      - ".github/workflows/operator_fix_pick.yml"
  pull_request:
    paths:
      - "scripts/**"
      - "tests/**"
      - "pytest.ini"
      - ".github/workflows/operator_fix_pick.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt
      - run: pip install -r scripts/requirements.txt pytest
      - name: Pytest
        run: python -m pytest tests/ -q --tb=short

      - name: Pytest failed — context (no secrets)
        if: failure()
        run: |
          echo "Re-run locally: python -m pytest tests/ -vv --tb=long"
          bash scripts/ci_failure_context.sh
